<!DOCTYPE html>
<html>
    <head>
        <title>Input Text Form</title>
    </head>
    <body>
        <form>
            <table>
                <tr>
                    <td><table for="nama">Nama</table></td>
                    <td>: <input type="text" size="20" name="nama"/></td>
                </tr>
                <tr>
                    <td><label for="alamat">Alamat</label></td>
                    <td>: <input type="text" size="40" name="alamat"/></td>
                </tr>
            </table>
        </form>
    </body>
</html>
